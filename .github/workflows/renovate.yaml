name: renovate

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

# Only the caller's TOP-LEVEL permissions cascade into reusable
# workflows. The reusable's renovate job needs contents/issues/PR
# writes for repo state + actions:read for its post-step that fetches
# the job log to detect package-lookup failures. See AGENTS.md.
permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

jobs:
  renovate:
    uses: jr200-labs/github-action-templates/.github/workflows/renovate.yaml@master
    secrets:
      INTEGRATION_APP_PRIVATE_KEY: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
