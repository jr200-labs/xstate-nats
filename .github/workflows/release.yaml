name: release

# release-please opens a Release PR on every push to master. Merging the
# Release PR creates a tag + GitHub Release, which dispatches the npm publish.

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    uses: jr200-labs/github-action-templates/.github/workflows/release_please.yaml@master
    with:
      release-type: node
      target-branch: master
    secrets:
      app_private_key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}

  publish:
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: jr200-labs/github-action-templates/.github/workflows/build_publish_npmjs.yaml@master
    with:
      checkout-ref: ${{ needs.release.outputs.tag_name }}
      pnpm-run-test: 'true'
      node-version: '22'
    secrets:
      npmjs_api_token: ${{ secrets.NPMJS_API_TOKEN }}
