# GENERATED/SHARED WORKFLOW: copied into consuming repos by sync-shared.
# DO NOT MANUALLY MODIFY THIS FILE IN A CONSUMER REPO.
# Always edit the source workflow in jr200-labs/github-action-templates, then sync.
name: sync-shared-drift

# If the shared workflow drift check fails, repair the default branch by
# running sync-shared and opening/updating a normal PR. This keeps generated
# workflow updates out of unrelated Renovate or feature PRs.

on:
  workflow_run:
    workflows: [drift-check]
    types: [completed]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool
        required: false
        type: choice
        default: configured
        options:
          - configured
          - self-hosted
          - github-hosted

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-shared-drift
  cancel-in-progress: false

jobs:
  sync-shared-drift:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'failure'
    runs-on: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'self-hosted' && 'self-hosted' || github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'github-hosted' && 'ubuntu-latest' || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write
          permission-workflows: write

      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Sync shared workflow callers
        run: ./scripts/sync-shared

      - name: Bypass commit-msg hook for the bot commit
        # sync-shared sets core.hooksPath=.githooks so the commit-msg lint
        # runs on human commits. peter-evans/create-pull-request commits
        # with a fixed bot message, and the runner does not install
        # cocogitto — the hook would fail every drift-repair. Unset for
        # this step; the commit message is enforced by the guard below.
        run: git config --local --unset-all core.hooksPath || true

      - name: Create drift repair PR
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/sync-shared-workflows
          delete-branch: true
          commit-message: "chore: sync shared workflows"
          title: "chore: sync shared workflows"
          body: |
            ## Summary
            - Sync shared workflow caller files from `jr200-labs/github-action-templates`.
            - Repair drift detected by `drift-check`.

            This PR is generated by `.github/workflows/sync-shared-drift.yaml`.

      - name: Enable auto-merge for generated sync PR
        if: steps.create-pull-request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number }}
        run: |
          set -euo pipefail

          pr_json="$(gh pr view "${PR_NUMBER}" --json title,headRefName,files)"
          title="$(jq -r '.title' <<<"${pr_json}")"
          branch="$(jq -r '.headRefName' <<<"${pr_json}")"

          if [ "${title}" != "chore: sync shared workflows" ] || [ "${branch}" != "chore/sync-shared-workflows" ]; then
            echo "Refusing auto-merge for unexpected PR ${PR_NUMBER}: ${branch} / ${title}" >&2
            exit 1
          fi

          jq -r '.files[].path' <<<"${pr_json}" | while IFS= read -r path; do
            case "${path}" in
              .github/workflows/*.yaml|.github/workflows/*.yml|.githooks/commit-msg|.githooks/lint-message-text.sh|cog.toml|scripts/sync-shared|scripts/sync-shared-drift-check|package.json)
                ;;
              *)
                echo "Refusing auto-merge for unexpected sync-shared path: ${path}" >&2
                exit 1
                ;;
            esac
          done

          gh pr merge "${PR_NUMBER}" --squash --auto --delete-branch # lint-no-auto-merge:allow
